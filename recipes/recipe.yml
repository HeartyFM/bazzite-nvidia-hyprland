# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-nvidia-hyprland
description: Bazzite NVIDIA official base with Hyprland layered into the image

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      # v0 dependency test: add tofik/sway to provide newer
      # wlroots/display stack dependencies such as libdisplay-info.so.2.
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-%OS_VERSION%/solopasha-hyprland-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/tofik/sway/repo/fedora-%OS_VERSION%/tofik-sway-fedora-%OS_VERSION%.repo
    install:
      # v0: prove Hyprland core dependencies resolve on the NVIDIA base.
      - hyprland
      - xdg-desktop-portal-hyprland

      # Do not install NVIDIA drivers here. They must come from
      # ghcr.io/ublue-os/bazzite-nvidia-open:stable.
