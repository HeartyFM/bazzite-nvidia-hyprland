# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-nvidia-hyprland
description: Bazzite NVIDIA official base with Hyprland layered into the image

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      # v1 uses only the critical Hyprland COPR from the previous working
      # Hyprland image. Additional COPRs can be added later if needed.
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-%OS_VERSION%/solopasha-hyprland-fedora-%OS_VERSION%.repo
    install:
      # v1: recover a Hyprland session on top of the official NVIDIA base.
      - hyprland
      - xdg-desktop-portal-hyprland
      - waybar
      - kitty
      - grim
      - slurp
      - wl-clipboard
      - playerctl
      - pamixer
      - gamemode
      - matugen
      - swww
      - hyprlock
      - rofi
      - Thunar

      # Do not install NVIDIA drivers here. They must come from
      # ghcr.io/ublue-os/bazzite-nvidia-open:stable.
