# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-nvidia-hyprland
description: Bazzite NVIDIA official base with Hyprland layered into the image

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable

modules:
  - type: rpm-ostree
    repos:
      # Use lionheartp/Hyprland for Fedora 44 compatibility.
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-%OS_VERSION%/lionheartp-Hyprland-fedora-%OS_VERSION%.repo
    install:
      # v2: Hyprland core, basic session tools, media/audio, and gamemode.
      - hyprland
      - xdg-desktop-portal-hyprland
      - waybar
      - kitty
      - grim
      - slurp
      - wl-clipboard
      - playerctl
      - pamixer
      - gamemode

      # Do not install NVIDIA drivers here. They must come from
      # ghcr.io/ublue-os/bazzite-nvidia-open:stable.
