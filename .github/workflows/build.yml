name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Build image with BlueBuild
        uses: blue-build/github-action@v1.11
        with:
          recipe: recipe.yml
          registry: ghcr.io
          registry_namespace: diegoduartemorales23
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          # BlueBuild currently requires this input for signed images.
          # Add SIGNING_SECRET before expecting signed rebase to work.
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          maximize_build_space: true
